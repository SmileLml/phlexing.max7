title: zt_task
author: Yuting Wang
version: "1.0"
fields:
  - field: id
    range: 1-12
  - field: project
    range: 1
  - field: execution
    range: 3
  - field: name
    range: "父任务A,子任务Aa,子任务Ab,父任务B,子任务Ba,子任务Bb,任务C,任务D,任务E,任务F,任务G,任务H"
  - field: module
    range: 0{3},1{3},2{3},3{3}
  - field: story
    range: 1,0{9}
  - field: consumed
    range: 0
  - field: parent
    range: "`-1`,1{2},`-1`,4{2},[0]{6}"
  - field: status
    range: "doing,doing,wait,wait,wait,wait,cancel,done,closed,closed,wait,pause"
  - field: mode
    range: "[]"
  - field: deleted
    range: 0
  - field: assignedTo
    range: "admin"
  - field: estStarted
    range: "20241005 000000"
    type: timestamp
    format: "YYYY-MM-DD"
  - field: deadline
    range: "20241010 000000"
    type: timestamp
    format: "YYYY-MM-DD"
    postfix: "\t"
  - field: realStarted
    range: "[]"
  - field: finishedBy
    range: "[]{7},admin,[]{4}"
  - field: finishedDate
    range: "[]{7},[2024-10-10]{2},[]{3}"
  - field: closedReason
    range: "[]{7},done,cancel,[]{3}"
