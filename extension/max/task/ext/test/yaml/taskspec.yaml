title: zt_taskkspec
author: Fangzhou Hu
version: "1.0"
fields:
  - field: task
    range: "1,2,3,1,3,4,5"
  - field: version
    range: 1{3},2{2},1{2}
  - field: name
    range: "任务1,任务2,任务3,任务1A,任务3B,任务4,任务5"
  - field: estStarted
    range: "20201101 000000:1D"
    type: timestamp
    format: "YYYY-MM-DD"
  - field: deadline
    range: "20210101 000000:1D"
    type: timestamp
    format: "YYYY-MM-DD"
